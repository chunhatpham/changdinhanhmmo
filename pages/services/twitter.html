<style>
    /* HIỆU ỨNG VÀ BỐ CỤC TRANG ĐANG CẬP NHẬT */
    .coming-soon-wrapper {
        animation: fadeIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 70vh;
        padding: 20px;
    }

    .cs-card {
        background: linear-gradient(145deg, rgba(30,30,35,0.8) 0%, rgba(20,20,25,0.9) 100%);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255,255,255,0.05);
        border-radius: 30px;
        padding: 50px 40px;
        text-align: center;
        max-width: 550px;
        width: 100%;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 2px 2px rgba(255,255,255,0.05);
        position: relative;
        overflow: hidden;
    }

    /* Hiệu ứng ánh sáng nền */
    .cs-card::before {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at center, rgba(10,132,255,0.1) 0%, transparent 60%);
        animation: pulseLight 4s infinite alternate;
        pointer-events: none;
        z-index: 0;
    }

    @keyframes pulseLight {
        0% { transform: scale(0.9); opacity: 0.5; }
        100% { transform: scale(1.1); opacity: 1; }
    }

    /* Vòng tròn Icon chứa bánh răng xoay */
    .cs-icon-box {
        position: relative;
        width: 100px;
        height: 100px;
        margin: 0 auto 30px;
        z-index: 2;
    }

    .cs-icon-bg {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(10,132,255,0.15);
        border-radius: 30px;
        transform: rotate(45deg);
        border: 1px solid rgba(10,132,255,0.3);
        box-shadow: 0 10px 30px rgba(10,132,255,0.3);
    }

    .cs-icon {
        position: relative;
        width: 100%; height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #0A84FF;
    }

    .cs-icon svg {
        width: 45px !important;
        height: 45px !important;
        fill: currentColor;
        animation: spinGear 6s linear infinite;
    }

    @keyframes spinGear {
        100% { transform: rotate(360deg); }
    }

    /* Nội dung Text */
    .cs-title {
        color: #fff;
        font-size: 24px;
        font-weight: 900;
        letter-spacing: 1px;
        margin-bottom: 15px;
        text-transform: uppercase;
        position: relative;
        z-index: 2;
        background: linear-gradient(to right, #0A84FF, #00C6FF);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .cs-desc {
        color: #8e8e93;
        font-size: 14.5px;
        line-height: 1.6;
        margin-bottom: 35px;
        position: relative;
        z-index: 2;
    }

    .cs-desc strong {
        color: #fff;
    }

    /* Thanh tiến trình giả lập */
    .cs-progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 35px;
        position: relative;
        z-index: 2;
    }

    .cs-progress-fill {
        height: 100%;
        width: 65%; /* Tiến độ ảo */
        background: linear-gradient(90deg, #0A84FF, #00C6FF);
        border-radius: 10px;
        position: relative;
    }

    .cs-progress-fill::after {
        content: '';
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }

    /* Nút điều hướng */
    .cs-buttons {
        display: flex;
        gap: 15px;
        position: relative;
        z-index: 2;
    }

    .cs-btn {
        flex: 1;
        padding: 15px 20px;
        border-radius: 16px;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        transition: 0.3s;
        border: none;
    }

    .btn-primary {
        background: linear-gradient(135deg, #0A84FF, #0056b3);
        color: #fff;
        box-shadow: 0 10px 20px rgba(10,132,255,0.4);
    }
    .btn-primary:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 25px rgba(10,132,255,0.6);
    }

    .btn-secondary {
        background: rgba(255,255,255,0.05);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.1);
    }
    .btn-secondary:hover {
        background: rgba(255,255,255,0.1);
        transform: translateY(-3px);
    }

    .cs-btn svg {
        width: 18px !important;
        height: 18px !important;
        fill: currentColor;
    }

    @media (max-width: 500px) {
        .cs-buttons { flex-direction: column; }
    }
</style>
